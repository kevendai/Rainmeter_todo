[Rainmeter]
Update=100
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
OnRefreshAction=["#@#CalendarHost.exe" "Startup"]

[Metadata]
Name=Today Calendar
Author=Codex
Information=Today's CalDAV events with one-way conversion to timed tasks.
Version=1.3.4

[Variables]
FontFace=Microsoft YaHei UI
TextColor=21,32,48,255
MutedColor=92,108,130,255
AccentColor=47,132,235,255
OngoingColor=28,145,82,255
ConflictColor=238,69,78,255
BorderColor=198,216,232,210
SubtleColor=75,91,113,255
SyncStart=0

@Include=#@#Generated.inc

[MeasureSkinCounter]
Measure=Calc
Formula=Counter

[MeasureSyncSpin]
Measure=Calc
Formula=(Counter - #SyncStart#) % 36
Disabled=1
DynamicVariables=1

[MeasureRollover]
Measure=Time
Format=%Y-%m-%d %H:%M
UpdateDivider=9000
OnChangeAction=["#@#CalendarHost.exe" "Rollover"]
