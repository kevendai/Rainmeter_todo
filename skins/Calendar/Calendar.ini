[Rainmeter]
Update=100
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
OnRefreshAction=["#@#CalendarHost.exe" "Startup"]

[Metadata]
Name=Today Calendar
Author=Codex
Information=Today's CalDAV events with one-way conversion to timed tasks.
Version=1.1.0

[Variables]
FontFace=Microsoft YaHei UI
TextColor=21,32,48,255
MutedColor=92,108,130,255
AccentColor=47,132,235,255
OngoingColor=28,145,82,255
ConflictColor=238,69,78,255
BorderColor=198,216,232,210
SubtleColor=75,91,113,255
PanelWidth=520
SyncStart=0

[StyleText]
Meter=String
FontFace=#FontFace#
FontSize=11
FontColor=#TextColor#
AntiAlias=1
ClipString=1
DynamicVariables=1

@include=#@#Generated.inc

[MeasureSkinCounter]
Measure=Calc
Formula=Counter

[MeasureSyncSpin]
Measure=Calc
Formula=(Counter - #SyncStart#) % 36
Disabled=1
DynamicVariables=1

[MeasureRollover]
Measure=Time
Format=%Y-%m-%d %H:%M
UpdateDivider=9000
OnChangeAction=["#@#CalendarHost.exe" "Rollover"]

[Header]
Meter=String
MeterStyle=StyleText
X=22
Y=18
W=330
H=32
FontSize=18
FontWeight=600
Text=今日日程

[HeaderRule]
Meter=Shape
X=22
Y=69
Shape=Rectangle 0,0,476,1 | Fill Color #BorderColor# | StrokeWidth 0

[ManageBackground]
Meter=Shape
X=423
Y=22
Shape=Rectangle 0,0,36,36,10 | Fill Color 247,251,255,235 | Stroke Color #BorderColor# | StrokeWidth 1
LeftMouseUpAction=["#@#CalendarHost.exe" "Manage"]

[SyncBackground]
Meter=Shape
X=464
Y=22
Shape=Rectangle 0,0,36,36,10 | Fill Color 50,136,236,245 | Stroke Color 68,153,244,255 | StrokeWidth 1
LeftMouseUpAction=["#@#CalendarHost.exe" "Sync"]

[Manage]
Meter=String
X=441
Y=40
W=36
H=36
FontFace=Segoe Fluent Icons
FontSize=12
FontColor=#MutedColor#
StringAlign=CenterCenter
AntiAlias=1
Text=
ToolTipText=日程管理
MouseOverAction=[!SetOption Manage FontColor "#TextColor#"][!UpdateMeter Manage][!Redraw]
MouseLeaveAction=[!SetOption Manage FontColor "#MutedColor#"][!UpdateMeter Manage][!Redraw]
LeftMouseUpAction=["#@#CalendarHost.exe" "Manage"]

[Sync]
Meter=String
X=482
Y=40
W=36
H=36
FontFace=Segoe Fluent Icons
FontSize=12
FontColor=225,242,255,255
StringAlign=CenterCenter
AntiAlias=1
Text=
ToolTipText=立即同步 CalDAV
MouseOverAction=[!SetOption Sync FontColor "255,255,255,255"][!UpdateMeter Sync][!Redraw]
MouseLeaveAction=[!SetOption Sync FontColor "225,242,255,255"][!UpdateMeter Sync][!Redraw]
LeftMouseUpAction=[!SetOption Sync FontColor "#AccentColor#"][!SetOption CalendarStatus Text "正在同步日程…"][!SetOption CalendarStatus FontColor "#AccentColor#"][!UpdateMeter Sync][!UpdateMeter CalendarStatus][!Redraw]["#@#CalendarHost.exe" "Sync"]
