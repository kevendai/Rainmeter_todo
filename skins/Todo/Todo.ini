[Rainmeter]
Update=100
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
OnRefreshAction=["#@#TodoHost.exe" "Startup"]

[MeasureRollover]
Measure=Time
Format=%Y%m%d%H%M
UpdateDivider=600
OnChangeAction=["#@#TodoHost.exe" "Rollover"]

[Metadata]
Name=Todo Board
Author=Codex
Information=Editable todo board with daily arXiv feed integration.
Version=1.2.0

[Variables]
FontFace=Microsoft YaHei UI
TextColor=21,32,48,255
MutedColor=92,108,130,255
AccentColor=47,132,235,255
DoneColor=28,145,82,255
DangerColor=238,69,78,255
PanelColor=239,248,255,248
CardColor=247,251,255,242
DoneCardColor=239,249,244,238
BorderColor=198,216,232,210
SubtleColor=75,91,113,255
PanelWidth=520
SyncStart=0

[StyleText]
Meter=String
FontFace=#FontFace#
FontSize=11
FontColor=#TextColor#
AntiAlias=1
ClipString=1
DynamicVariables=1

@include=#@#Generated.inc

[MeasureSkinCounter]
Measure=Calc
Formula=Counter

[MeasureSyncSpin]
Measure=Calc
Formula=(Counter - #SyncStart#) % 36
Disabled=1
DynamicVariables=1

[Header]
Meter=String
MeterStyle=StyleText
X=22
Y=18
W=300
H=32
FontSize=18
FontWeight=600
Text=待办事项

[HeaderRule]
Meter=Shape
X=22
Y=69
Shape=Rectangle 0,0,476,1 | Fill Color #BorderColor# | StrokeWidth 0

[SettingsBackground]
Meter=Shape
X=341
Y=22
Shape=Rectangle 0,0,36,36,10 | Fill Color 247,251,255,235 | Stroke Color #BorderColor# | StrokeWidth 1
LeftMouseUpAction=["#@#TodoHost.exe" "Settings"]

[ManageBackground]
Meter=Shape
X=382
Y=22
Shape=Rectangle 0,0,36,36,10 | Fill Color 247,251,255,235 | Stroke Color #BorderColor# | StrokeWidth 1
LeftMouseUpAction=["#@#TodoHost.exe" "Manage"]

[AddBackground]
Meter=Shape
X=423
Y=22
Shape=Rectangle 0,0,36,36,10 | Fill Color 50,136,236,245 | Stroke Color 68,153,244,255 | StrokeWidth 1
LeftMouseUpAction=["#@#TodoHost.exe" "Add"]

[SyncBackground]
Meter=Shape
X=464
Y=22
Shape=Rectangle 0,0,36,36,10 | Fill Color 247,251,255,235 | Stroke Color #BorderColor# | StrokeWidth 1
LeftMouseUpAction=["#@#TodoHost.exe" "SyncArxiv" "Force"]

[Settings]
Meter=String
X=359
Y=40
W=36
H=36
FontFace=Segoe Fluent Icons
FontSize=12
FontColor=#MutedColor#
StringAlign=CenterCenter
AntiAlias=1
Text=
ToolTipText=翻译设置
MouseOverAction=[!SetOption Settings FontColor "#TextColor#"][!UpdateMeter Settings][!Redraw]
MouseLeaveAction=[!SetOption Settings FontColor "#MutedColor#"][!UpdateMeter Settings][!Redraw]
LeftMouseUpAction=["#@#TodoHost.exe" "Settings"]

[Manage]
Meter=String
X=400
Y=40
W=36
H=36
FontFace=Segoe Fluent Icons
FontSize=12
FontColor=#MutedColor#
StringAlign=CenterCenter
AntiAlias=1
Text=
ToolTipText=管理全部任务
MouseOverAction=[!SetOption Manage FontColor "#TextColor#"][!UpdateMeter Manage][!Redraw]
MouseLeaveAction=[!SetOption Manage FontColor "#MutedColor#"][!UpdateMeter Manage][!Redraw]
LeftMouseUpAction=["#@#TodoHost.exe" "Manage"]

[Add]
Meter=String
X=441
Y=40
W=36
H=36
FontFace=Segoe Fluent Icons
FontSize=12
FontColor=225,242,255,255
StringAlign=CenterCenter
AntiAlias=1
Text=
ToolTipText=新增待办
MouseOverAction=[!SetOption Add FontColor "255,255,255,255"][!UpdateMeter Add][!Redraw]
MouseLeaveAction=[!SetOption Add FontColor "225,242,255,255"][!UpdateMeter Add][!Redraw]
LeftMouseUpAction=["#@#TodoHost.exe" "Add"]

[Sync]
Meter=String
X=482
Y=40
W=36
H=36
FontFace=Segoe Fluent Icons
FontSize=12
FontColor=#MutedColor#
StringAlign=CenterCenter
AntiAlias=1
Text=
DynamicVariables=1
ToolTipText=立即检查今日 arXiv 前五篇
MouseOverAction=[!SetOption Sync FontColor "#TextColor#"][!UpdateMeter Sync][!Redraw]
MouseLeaveAction=[!SetOption Sync FontColor "#MutedColor#"][!UpdateMeter Sync][!Redraw]
LeftMouseUpAction=[!SetOption Sync FontColor "#AccentColor#"][!SetOption Status Text "正在查找论文…"][!SetOption Status FontColor "#AccentColor#"][!UpdateMeter Sync][!UpdateMeter Status][!Redraw]["#@#TodoHost.exe" "SyncArxiv" "Force"]
