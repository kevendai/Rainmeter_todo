[Rainmeter]
Update=100
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
OnRefreshAction=["#@#TodoHost.exe" "Startup"]

[MeasureRollover]
Measure=Time
Format=%Y%m%d%H%M
UpdateDivider=600
OnChangeAction=["#@#TodoHost.exe" "Rollover"]

[Metadata]
Name=Todo Board
Author=Codex
Information=Editable todo board with daily arXiv feed integration.
Version=1.3.4

[Variables]
FontFace=Microsoft YaHei UI
TextColor=21,32,48,255
MutedColor=92,108,130,255
AccentColor=47,132,235,255
DoneColor=28,145,82,255
DangerColor=238,69,78,255
PanelColor=239,248,255,248
CardColor=247,251,255,242
DoneCardColor=239,249,244,238
BorderColor=198,216,232,210
SubtleColor=75,91,113,255
SyncStart=0

@Include=#@#Generated.inc

[MeasureSkinCounter]
Measure=Calc
Formula=Counter

[MeasureSyncSpin]
Measure=Calc
Formula=(Counter - #SyncStart#) % 36
Disabled=1
DynamicVariables=1
